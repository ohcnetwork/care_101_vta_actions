name: Create Facility Evaluation

on:
  push:
    branches: ["submission-*"]

jobs:
  evaluate_facility:
    runs-on: ubuntu-slim
    env:
      CARE_API_BASE_URL: ${{ secrets.CARE_API_BASE_URL }}
      CARE_FE_BASE_URL: ${{ secrets.CARE_FE_BASE_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.CARE_GITHUB_ACTION_TOKEN }}

      - name: Fetch setup data from main
        id: setup
        run: |
          git fetch origin main
          git checkout origin/main -- setup_data.json
          USER_ID=$(jq -r '.user.id' setup_data.json)
          FORT_KOCHI_ID=$(jq -r '.geo_organization.fort_kochi.id' setup_data.json)

          if [ -z "$USER_ID" ] || [ "$USER_ID" = "null" ]; then
            echo "::error::Could not read user.id from setup_data.json"
            exit 1
          fi
          if [ -z "$FORT_KOCHI_ID" ] || [ "$FORT_KOCHI_ID" = "null" ]; then
            echo "::error::Could not read geo_organization.fort_kochi.id from setup_data.json"
            exit 1
          fi

          echo "user_id=$USER_ID" >> $GITHUB_OUTPUT
          echo "fort_kochi_id=$FORT_KOCHI_ID" >> $GITHUB_OUTPUT

      - name: Parse submission data
        id: parse
        run: |
          SUBMISSION_ID=$(jq -r '.id' submission.json)
          FACILITY_URL=$(jq -r '.checklist[1].result' submission.json)

          echo "submission_id=$SUBMISSION_ID" >> $GITHUB_OUTPUT
          echo "facility_url=$FACILITY_URL" >> $GITHUB_OUTPUT

          # reject URLs not from the CARE frontend
          case "$FACILITY_URL" in
            "$CARE_FE_BASE_URL"/*)
              ;;
            *)
              echo "::error::URL does not start with $CARE_FE_BASE_URL: $FACILITY_URL"
              echo "valid=false" >> $GITHUB_OUTPUT
              exit 0
              ;;
          esac

          # URL format: <CARE_FE_BASE_URL>/facility/{facility_id}/overview
          FACILITY_ID=$(echo "$FACILITY_URL" | sed -nE 's|.*/facility/([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}).*|\1|p')

          if [ -z "$FACILITY_ID" ]; then
            echo "::error::Could not parse facility_id from URL: $FACILITY_URL"
            echo "valid=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "facility_id=$FACILITY_ID" >> $GITHUB_OUTPUT
          echo "valid=true" >> $GITHUB_OUTPUT

      - name: Validate parsed URL
        if: steps.parse.outputs.valid != 'true'
        env:
          FACILITY_URL: ${{ steps.parse.outputs.facility_url }}
        run: |
          FEEDBACK=$(printf "Uh oh! The facility URL you submitted could not be parsed. Please make sure you copy the full URL from your browser address bar after creating the facility.\n\nExpected format: \`%s/facility/<facility-id>/overview\`\n\nURL submitted: \`%s\`" \
            "$CARE_FE_BASE_URL" "$FACILITY_URL")

          jq -n \
            --arg status "failure" \
            --arg feedback "$FEEDBACK" \
            '{status: $status, feedback: $feedback}' > report.json

          echo "skip_checks=true" >> $GITHUB_ENV

      - name: Check facility requirements
        if: env.skip_checks != 'true'
        id: check
        uses: ohc-vta/care-actions/check-api@main
        env:
          CARE_API_USERNAME: ${{ secrets.CARE_API_USERNAME }}
          CARE_API_PASSWORD: ${{ secrets.CARE_API_PASSWORD }}
        with:
          endpoint: "/api/v1/facility/${{ steps.parse.outputs.facility_id }}/"
          method: GET
          jq-filter: |
            [
              (.name | test("^.+'s PHC( \\d+)?$")),
              (.facility_type == "Primary Health Centres"),
              ((.address // "") | length > 0),
              ((.pincode | tostring) | test("^\\d{6}$")),
              (.phone_number | test("^(\\+91)?7\\d{9}$")),
              (.geo_organization.id == "${{ steps.setup.outputs.fort_kochi_id }}"),
              ((.features // []) | length >= 2),
              (.is_public == false),
              (.created_by.id == "${{ steps.setup.outputs.user_id }}")
            ] | map(select(.)) | length
          assertion: equals
          expected: "9"
          label: "All facility requirements met"
          output-jq-filter: |
            {
              name: (.name | test("^.+'s PHC( \\d+)?$")),
              type: (.facility_type == "Primary Health Centres"),
              address: ((.address // "") | length > 0),
              pincode: ((.pincode | tostring) | test("^\\d{6}$")),
              phone: (.phone_number | test("^(\\+91)?7\\d{9}$")),
              org: (.geo_organization.id == "${{ steps.setup.outputs.fort_kochi_id }}"),
              features: ((.features // []) | length >= 2),
              public: (.is_public == false),
              creator: (.created_by.id == "${{ steps.setup.outputs.user_id }}")
            }

      - name: Build feedback
        if: env.skip_checks != 'true'
        env:
          RESULT: ${{ steps.check.outputs.result }}
          RESULTS: ${{ steps.check.outputs.extracted }}
          PASSED: ${{ steps.check.outputs.passed }}
        run: |
          if echo "$RESULT" | grep -q '^error:'; then
            FEEDBACK=$(printf "Uh oh! We couldn't fetch your facility from CARE.\n\nDetails: %s\n\nMake sure the facility URL you submitted is correct and that the facility hasn't been deleted. Expected URL format: \`%s/facility/<facility-id>/overview\`" \
              "$RESULT" "$CARE_FE_BASE_URL")

            jq -n \
              --arg status "failure" \
              --arg feedback "$FEEDBACK" \
              '{status: $status, feedback: $feedback}' > report.json
            exit 0
          fi

          # map results to check flags
          T1="✗"; T2="✗"; T3="✗"; T4="✗"; T5="✗"; T6="✗"; T7="✗"; T8="✗"; T9="✗"
          [ "$(echo "$RESULTS" | jq -r '.name')"     = "true" ] && T1="✓"
          [ "$(echo "$RESULTS" | jq -r '.type')"     = "true" ] && T2="✓"
          [ "$(echo "$RESULTS" | jq -r '.address')"  = "true" ] && T3="✓"
          [ "$(echo "$RESULTS" | jq -r '.pincode')"  = "true" ] && T4="✓"
          [ "$(echo "$RESULTS" | jq -r '.phone')"    = "true" ] && T5="✓"
          [ "$(echo "$RESULTS" | jq -r '.org')"      = "true" ] && T6="✓"
          [ "$(echo "$RESULTS" | jq -r '.features')" = "true" ] && T7="✓"
          [ "$(echo "$RESULTS" | jq -r '.public')"   = "true" ] && T8="✓"
          [ "$(echo "$RESULTS" | jq -r '.creator')"  = "true" ] && T9="✓"

          if [ "$PASSED" = "true" ]; then
            HEADER="Great work! All checks passed. Your facility meets all the requirements."
            STATUS="success"
            FOOTER=""
          else
            HEADER="Uh oh! It looks like you've missed some parts of the assignment. Here are the results of the tests that we ran. A tick (✓) indicates a successful test, and a cross (✗) indicates a failed test."
            STATUS="failure"
            FOOTER=$'\n\nPlease make sure that you go through the assignment instructions and verify your facility settings in CARE. If you\'re having trouble with this assignment, refer to the course materials and provided guidelines.'
          fi

          FEEDBACK=$(printf "%s\n\n%s Name should match the pattern \"<Your Name>'s PHC\" (with an optional trailing number, e.g. \"Yaswanth's PHC 2\")\n\n%s Facility Type should be \"Primary Health Centres\"\n\n%s Address should not be empty\n\n%s Pincode should be a valid 6-digit Indian pincode\n\n%s Phone Number should be a valid Indian mobile number starting with 7 (e.g. +917XXXXXXXXX)\n\n%s Facility should be created under the \"Fort Kochi\" ward (Kerala → Ernakulam → Kochi Corporation → Fort Kochi)\n\n%s At least 2 features should be selected\n\n%s Facility should be private (Public Facility unchecked)\n\n%s Facility should be created by you (using the credentials assigned to you)%s" \
            "$HEADER" "$T1" "$T2" "$T3" "$T4" "$T5" "$T6" "$T7" "$T8" "$T9" "$FOOTER")

          jq -n \
            --arg status "$STATUS" \
            --arg feedback "$FEEDBACK" \
            '{status: $status, feedback: $feedback}' > report.json

      - name: Persist facility_id to setup_data.json
        if: env.skip_checks != 'true' && steps.check.outputs.passed == 'true'
        continue-on-error: true
        uses: ohc-vta/care-actions/persist-setup-data@main
        with:
          submission-id: ${{ steps.parse.outputs.submission_id }}
          commit-message: "chore(setup): record facility_management.facility_id (submission ${{ steps.parse.outputs.submission_id }})"
          jq-args: |
            fid=${{ steps.parse.outputs.facility_id }}
          jq-merge: |
            . as $root | (.facility_management // {}) as $fm
            | $root + {facility_management: ($fm + {facility_id: $fid})}
          alert-context: "facility_management.facility_id=${{ steps.parse.outputs.facility_id }}"

      - name: Grade submission
        if: always()
        uses: pupilfirst/grade-action@v1
        with:
          report_file_path: "report.json"
        env:
          REVIEW_END_POINT: ${{ secrets.PF_REVIEW_END_POINT }}
          REVIEW_BOT_USER_TOKEN: ${{ secrets.PF_REVIEW_BOT_USER_TOKEN }}

      - name: Report success to LMS
        if: success()
        uses: pupilfirst/report-action@v1
        with:
          status: "success"
          description: "Facility evaluation completed."
        env:
          REVIEW_END_POINT: ${{ secrets.PF_REVIEW_END_POINT }}
          REVIEW_BOT_USER_TOKEN: ${{ secrets.PF_REVIEW_BOT_USER_TOKEN }}

      - name: Report failure to LMS
        if: failure()
        uses: pupilfirst/report-action@v1
        with:
          status: "error"
          description: "Facility evaluation failed unexpectedly. Please resubmit or contact support."
        env:
          REVIEW_END_POINT: ${{ secrets.PF_REVIEW_END_POINT }}
          REVIEW_BOT_USER_TOKEN: ${{ secrets.PF_REVIEW_BOT_USER_TOKEN }}
